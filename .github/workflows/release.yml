name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Build OpenClaw runtime image for macOS (linux/arm64)
  # ──────────────────────────────────────────────
  build-runtime-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Nova
        uses: actions/checkout@v4
        with:
          path: nova

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/openclaw
          token: ${{ secrets.NOVA_READ_PAT }}
          path: openclaw

      - name: Checkout Nova skills
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/nova-skills
          token: ${{ secrets.NOVA_READ_PAT }}
          path: nova-skills

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install OpenClaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build OpenClaw
        working-directory: openclaw
        run: pnpm build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OpenClaw runtime image (linux/arm64)
        working-directory: nova
        env:
          OPENCLAW_SOURCE: ${{ github.workspace }}/openclaw
          NOVA_SKILLS_SOURCE: ${{ github.workspace }}/nova-skills
          DOCKER_DEFAULT_PLATFORM: linux/arm64
        run: ./scripts/build-openclaw-runtime.sh

      - name: Bundle runtime image tar
        working-directory: nova
        run: ./scripts/bundle-runtime-image.sh

      - name: Upload runtime image tar
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-runtime-arm64
          path: nova/src-tauri/resources/openclaw-runtime.tar.gz

  # ──────────────────────────────────────────────
  # macOS (Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    needs: build-runtime-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download runtime image tar (linux/arm64)
        uses: actions/download-artifact@v4
        with:
          name: openclaw-runtime-arm64
          path: src-tauri/resources

      - name: Bundle runtime (Colima + Lima + Docker CLI)
        run: ./scripts/bundle-runtime.sh

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Build Tauri app
        env:
          NOVA_GOOGLE_CLIENT_ID: ${{ secrets.NOVA_GOOGLE_CLIENT_ID }}
          NOVA_GOOGLE_CLIENT_SECRET: ${{ secrets.NOVA_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: pnpm tauri build

      - name: Sign bundled binaries
        env:
          CERT: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Nova.app"
          ENTITLEMENTS="src-tauri/entitlements.plist"

          for bin in docker colima limactl; do
            if [ -f "$APP_PATH/Contents/Resources/resources/bin/$bin" ]; then
              codesign --force --options runtime --timestamp --sign "$CERT" \
                "$APP_PATH/Contents/Resources/resources/bin/$bin"
            fi
          done

          codesign --force --options runtime --timestamp --sign "$CERT" \
            --entitlements "$ENTITLEMENTS" --deep "$APP_PATH"

      - name: Create and sign DMG
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Nova.app"
          DMG_NAME="Nova-${{ steps.version.outputs.tag }}-mac-arm64.dmg"
          hdiutil create -volname "Nova" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
          codesign --force --timestamp --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.dmg_name }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          xcrun stapler staple "${{ env.dmg_name }}"

      - name: Prepare updater artifacts
        id: updater
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          # Tauri produces Nova.app.tar.gz and Nova.app.tar.gz.sig when signing key is set
          UPDATER_TAR="$BUNDLE_DIR/Nova.app.tar.gz"
          UPDATER_SIG="$BUNDLE_DIR/Nova.app.tar.gz.sig"

          if [ -f "$UPDATER_SIG" ]; then
            echo "sig=$(cat "$UPDATER_SIG")" >> "$GITHUB_OUTPUT"
            echo "has_updater=true" >> "$GITHUB_OUTPUT"
            cp "$UPDATER_TAR" "Nova-${{ steps.version.outputs.tag }}-mac-arm64-updater.tar.gz"
          else
            echo "has_updater=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: No updater signature found. Set TAURI_SIGNING_PRIVATE_KEY to enable auto-updates."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-mac-arm64
          path: |
            ${{ env.dmg_name }}
            Nova-${{ steps.version.outputs.tag }}-mac-arm64-updater.tar.gz

      - name: Save updater metadata
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > updater-mac.json << METAEOF
          {
            "platform": "darwin-aarch64",
            "url": "https://github.com/dominant-strategies/nova-releases/releases/download/${VERSION}/Nova-${VERSION}-mac-arm64-updater.tar.gz",
            "signature": "${{ steps.updater.outputs.sig }}",
            "has_updater": "${{ steps.updater.outputs.has_updater }}"
          }
          METAEOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-mac
          path: updater-mac.json

  # ──────────────────────────────────────────────
  # Linux (x86_64)
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/openclaw
          token: ${{ secrets.NOVA_READ_PAT }}
          path: openclaw

      - name: Checkout Nova skills
        uses: actions/checkout@v4
        with:
          repository: dominant-strategies/nova-skills
          token: ${{ secrets.NOVA_READ_PAT }}
          path: nova-skills

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install OpenClaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build OpenClaw
        working-directory: openclaw
        run: pnpm build

      - name: Build OpenClaw runtime image (linux/amd64)
        env:
          OPENCLAW_SOURCE: ${{ github.workspace }}/openclaw
          NOVA_SKILLS_SOURCE: ${{ github.workspace }}/nova-skills
        run: ./scripts/build-openclaw-runtime.sh

      - name: Bundle runtime image tar
        run: ./scripts/bundle-runtime-image.sh

      - name: Bundle runtime (Linux)
        run: ./scripts/bundle-runtime.sh linux x86_64

      - name: Build Tauri app
        env:
          NOVA_GOOGLE_CLIENT_ID: ${{ secrets.NOVA_GOOGLE_CLIENT_ID }}
          NOVA_GOOGLE_CLIENT_SECRET: ${{ secrets.NOVA_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Prepare artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          # .deb
          DEB_NAME="Nova-${VERSION}-linux-x86_64.deb"
          cp "$BUNDLE_DIR/deb/"*.deb "$DEB_NAME"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"

          # .AppImage (Tauri produces this with updater sig)
          APPIMAGE_NAME="Nova-${VERSION}-linux-x86_64.AppImage"
          cp "$BUNDLE_DIR/appimage/"*.AppImage "$APPIMAGE_NAME"
          chmod +x "$APPIMAGE_NAME"
          echo "appimage_name=$APPIMAGE_NAME" >> "$GITHUB_OUTPUT"

          # Updater: AppImage + signature
          APPIMAGE_SIG=""
          if [ -f "$BUNDLE_DIR/appimage/"*.AppImage.sig ]; then
            APPIMAGE_SIG="$(cat "$BUNDLE_DIR/appimage/"*.AppImage.sig)"
          fi
          echo "appimage_sig=$APPIMAGE_SIG" >> "$GITHUB_OUTPUT"

          # tarball
          TAR_NAME="Nova-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p "nova-${VERSION}"
          cp "src-tauri/target/release/nova" "nova-${VERSION}/"
          cp -r "src-tauri/resources" "nova-${VERSION}/" 2>/dev/null || true
          tar czf "$TAR_NAME" "nova-${VERSION}"
          echo "tar_name=$TAR_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-linux-x86_64
          path: |
            ${{ steps.artifacts.outputs.deb_name }}
            ${{ steps.artifacts.outputs.appimage_name }}
            ${{ steps.artifacts.outputs.tar_name }}

      - name: Save updater metadata
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cat > updater-linux.json << METAEOF
          {
            "platform": "linux-x86_64",
            "url": "https://github.com/dominant-strategies/nova-releases/releases/download/${VERSION}/Nova-${VERSION}-linux-x86_64.AppImage",
            "signature": "${{ steps.artifacts.outputs.appimage_sig }}"
          }
          METAEOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: updater-linux.json

  # ──────────────────────────────────────────────
  # Publish to dominant-strategies/nova-releases
  # ──────────────────────────────────────────────
  publish:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for auto-updater
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Strip leading 'v' for semver
          SEMVER="${VERSION#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO_URL="https://github.com/dominant-strategies/nova-releases/releases/download/${VERSION}"

          # Read updater metadata from each platform
          MAC_SIG=""
          LINUX_SIG=""
          if [ -f artifacts/updater-mac/updater-mac.json ]; then
            MAC_SIG="$(python3 -c "import json; d=json.load(open('artifacts/updater-mac/updater-mac.json')); print(d.get('signature',''))")"
          fi
          if [ -f artifacts/updater-linux/updater-linux.json ]; then
            LINUX_SIG="$(python3 -c "import json; d=json.load(open('artifacts/updater-linux/updater-linux.json')); print(d.get('signature',''))")"
          fi

          # Build latest.json (Tauri updater format)
          cat > artifacts/latest.json << LATESTEOF
          {
            "version": "${SEMVER}",
            "notes": "Nova ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${REPO_URL}/Nova-${VERSION}-mac-arm64-updater.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "linux-x86_64": {
                "url": "${REPO_URL}/Nova-${VERSION}-linux-x86_64.AppImage",
                "signature": "${LINUX_SIG}"
              }
            }
          }
          LATESTEOF

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          REPO="dominant-strategies/nova-releases"

          # Collect all release files (skip metadata JSONs used internally)
          FILES=()
          for f in artifacts/nova-mac-arm64/* artifacts/nova-linux-x86_64/*; do
            [ -f "$f" ] && FILES+=("$f")
          done
          # Include latest.json for auto-updater
          FILES+=("artifacts/latest.json")

          echo "Uploading ${#FILES[@]} files for $VERSION:"
          printf '  %s\n' "${FILES[@]}"

          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" "${FILES[@]}" \
              --repo "$REPO" --clobber
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" "${FILES[@]}" \
              --repo "$REPO" \
              --title "Nova $VERSION" \
              --notes "$(cat <<'EOF'
          ## Downloads

          | Platform | File | Install |
          |----------|------|---------|
          | macOS (Apple Silicon) | `.dmg` | Open DMG, drag to Applications |
          | Linux (x86_64) | `.deb` | `sudo dpkg -i Nova-*.deb` |
          | Linux (x86_64) | `.AppImage` | `chmod +x` and run |
          | Linux (x86_64) | `.tar.gz` | Extract and run `./nova` |

          ### Requirements
          - **macOS**: macOS 12+ (Apple Silicon). Signed and notarized.
          - **Linux**: Docker installed (`sudo apt install docker.io`). GTK3 + WebKitGTK.

          ### Auto-updates
          Existing Nova installations will update automatically.
          EOF
          )"
          fi
